name: mcps-codeql-config

# Shared config for the advanced-setup CodeQL workflow (.github/workflows/codeql.yml).
#
# The one rule causing ~100% of this repo's alert noise is
# `rust/hard-coded-cryptographic-value`: it fires on deterministic test nonces/seeds
# (REQUIRED for reproducible golden-vector conformance) and has zero true positives here.
# Excluding the QUERY — not just paths — is what clears both the `tests/` occurrences AND
# the `#[cfg(test)]` modules that live inside `src/` files, which a path filter cannot
# reach. This is the single change that ends the "fix -> re-scan -> same FPs" loop.
query-filters:
  - exclude:
      id: rust/hard-coded-cryptographic-value

  # Optional: the napi / PyO3 SDK bindings trip `rust/access-invalid-pointer` on
  # proc-macro-GENERATED FFI glue (the N-API / CPython runtime owns and guarantees those
  # raw pointers; there is no hand-written unsafe pointer code). Uncomment to silence that
  # recurring FP too. Trade-off: you lose the rule on any future hand-written unsafe
  # pointer code — re-enable it if the SDK ever grows real unsafe blocks.
  # - exclude:
  #     id: rust/access-invalid-pointer

# Belt-and-suspenders for the interpreted languages (python/actions): keep test, example,
# fixture and generated code out of analysis entirely. For Rust/compiled extraction this
# is best-effort — the query-filter above is what actually clears the Rust test FPs.
paths-ignore:
  - "**/tests/**"
  - "**/test/**"
  - "**/examples/**"
  - "**/fixtures/**"
  - "sdk/**/tests/**"
  - "sdk/**/test/**"
  - "sdk/typescript/dist/**"
  - "sdk/typescript/native/**"
